<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="X-Jay — Unity tools and assets to supercharge your workflow. Mesh Decimator, Anoobs Optimizer, and more.">
  <meta name="keywords" content="Unity, Unity Assets, Mesh Decimator, Optimizer, VRChat, Game Development, X-Jay">
  <meta name="author" content="X-Jay">
  <title>X-Jay — Unity Tools & Assets</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background Effects -->
  <div class="bg-grid"></div>

  <!-- ===== BANNER ===== -->
  <div class="banner" id="banner">
    <img src="xjay.png" alt="X-Jay" class="banner__logo">
    <p class="banner__sub">Unity Assets & Tools Developer</p>
  </div>

  <!-- ===== PROFILE BAR ===== -->
  <div class="profile-bar">
    <div class="container profile-bar__inner">

      <!-- Center: Search -->
      <div class="profile-bar__search">
        <svg class="profile-bar__search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Search products..." autocomplete="off">
      </div>

      <!-- Right: Social Links -->
      <div class="profile-bar__socials">
        <a href="https://discord.gg/BVfhju9EjX" target="_blank" rel="noopener noreferrer" class="social-btn" id="discord-link">
          <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
            <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128c.126-.094.252-.192.372-.292a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
          </svg>
          Discord
        </a>
        <a href="mailto:your-email@gmail.com" class="social-btn" id="email-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          Email
        </a>
      </div>
    </div>
  </div>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main">
    <div class="container">
      <div class="content-grid" id="contentGrid">
        <!-- Products loaded dynamically from data.json -->
      </div>
    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <div class="container footer__inner">
      <p class="footer__copy">&copy; <span class="current-year"></span> X-Jay. All rights reserved.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
